<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BR Birla International School</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #1a2a6c;
    --navy-dark: #0f1a4a;
    --gold: #f0c040;
    --gold-light: #f7d97a;
    --white: #ffffff;
  }

  body {
    background: var(--navy-dark);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  #doodle-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .bg-glow {
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(240,192,64,0.13) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    animation: pulse-glow 4s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }

  /* CARD */
  .card {
    position: relative;
    z-index: 10;
    background: linear-gradient(145deg, rgba(26,42,108,0.93), rgba(15,26,74,0.97));
    border: 2px solid rgba(240,192,64,0.5);
    border-radius: 28px;
    padding: 44px 38px 40px;
    max-width: 400px;
    width: 88%;
    text-align: center;
    backdrop-filter: blur(14px);
    box-shadow: 0 0 60px rgba(240,192,64,0.15), 0 20px 60px rgba(0,0,0,0.5);
    animation: card-in 1s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
    transform: translateY(40px) scale(0.95);
  }

  @keyframes card-in {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 55%; height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 0 0 4px 4px;
  }

  /* LOGO */
  .logo-wrap {
    width: 108px; height: 108px;
    margin: 0 auto 22px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--gold);
    box-shadow: 0 0 28px rgba(240,192,64,0.45);
    animation: logo-in 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  }

  @keyframes logo-in {
    from { transform: rotate(-15deg) scale(0.5); opacity: 0; }
    to { transform: rotate(0) scale(1); opacity: 1; }
  }

  .logo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    opacity: 0;
    animation: fade-up 0.8s ease 0.8s forwards;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--white);
    line-height: 1.3;
    margin-bottom: 12px;
    opacity: 0;
    animation: fade-up 0.8s ease 1s forwards;
  }

  .headline span {
    color: var(--gold);
  }

  .tagline {
    font-size: 13.5px;
    color: rgba(255,255,255,0.62);
    line-height: 1.65;
    margin-bottom: 28px;
    opacity: 0;
    animation: fade-up 0.8s ease 1.2s forwards;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 26px;
    opacity: 0;
    animation: fade-up 0.8s ease 1.3s forwards;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(240,192,64,0.3);
  }

  .btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy-dark);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    padding: 14px 34px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 6px 24px rgba(240,192,64,0.38);
    transition: transform 0.2s, box-shadow 0.2s;
    opacity: 0;
    animation: fade-up 0.8s ease 1.5s forwards;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent);
    border-radius: 50px;
  }

  .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(240,192,64,0.5); }
  .btn:active { transform: translateY(0); }

  .redirect-note {
    margin-top: 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.38);
    opacity: 0;
    animation: fade-up 0.8s ease 1.7s forwards;
  }

  #countdown { color: var(--gold); font-weight: 700; }

  .since {
    margin-top: 24px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(240,192,64,0.45);
    opacity: 0;
    animation: fade-up 0.8s ease 1.8s forwards;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* FLOATING DOODLE ICONS */
  .doodle {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
  }

  .doodle svg { display: block; }
</style>
</head>
<body>

<div class="bg-glow"></div>
<canvas id="doodle-canvas"></canvas>

<!-- CARD -->
<div class="card">
  <div class="logo-wrap">
    <img src="https://i.ibb.co/Q7SxyBqt/IMG-20260512-110758-511.webp" alt="BR Birla Logo"/>
  </div>

  <p class="eyebrow">Est. 1991 · Jodhpur, Rajasthan</p>

  <h1 class="headline">
    Welcome to<br><span>BR Birla International School</span>
  </h1>

  <p class="tagline">
    They don't just study the world.<br>They <em>experience</em> it.
  </p>

  <div class="divider"></div>

  <a href="https://www.facebook.com/share/1CKuXB318M/" class="btn" id="fb-btn">
    📘 &nbsp;Follow Us on Facebook
  </a>

  <p class="redirect-note">
    Redirecting in <span id="countdown">7</span>s &nbsp;·&nbsp; or tap above
  </p>

  <p class="since">BR Birla Group · Since 1991</p>
</div>

<script>
// ── COUNTDOWN ──
let secs = 7;
const cd = document.getElementById('countdown');
const fbUrl = 'https://www.facebook.com/share/1CKuXB318M/';
let timer = setInterval(() => {
  secs--;
  cd.textContent = secs;
  if (secs <= 0) { clearInterval(timer); window.location.href = fbUrl; }
}, 1000);
document.getElementById('fb-btn').addEventListener('click', () => clearInterval(timer));

// ── CANVAS DOODLES (animated lines) ──
const canvas = document.getElementById('doodle-canvas');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// Doodle shapes: pencils, stars, books, circles, zigzags on the sides
const shapes = [];
const SIDES_X = () => [
  ...Array.from({length:10}, () => ({ x: 30 + Math.random() * (W()*0.18), y: Math.random() * H() })),
  ...Array.from({length:10}, () => ({ x: W()*0.82 + Math.random() * (W()*0.16), y: Math.random() * H() })),
  ...Array.from({length:4},  () => ({ x: W()*0.2 + Math.random() * (W()*0.6), y: 20 + Math.random() * (H()*0.1) })),
  ...Array.from({length:4},  () => ({ x: W()*0.2 + Math.random() * (W()*0.6), y: H()*0.9 + Math.random() * (H()*0.08) })),
];

const types = ['star','circle','arc','zigzag','cross','pencil'];

function initShapes() {
  shapes.length = 0;
  SIDES_X().forEach(pos => {
    shapes.push({
      x: pos.x, y: pos.y,
      type: types[Math.floor(Math.random() * types.length)],
      size: 14 + Math.random() * 22,
      t: Math.random() * Math.PI * 2,
      speed: 0.004 + Math.random() * 0.007,
      opacity: 0.1 + Math.random() * 0.18,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.012,
      floatAmp: 6 + Math.random() * 10,
    });
  });
}
initShapes();
window.addEventListener('resize', initShapes);

function drawStar(ctx, x, y, r, points=5) {
  const step = Math.PI / points;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const radius = i % 2 === 0 ? r : r * 0.45;
    const angle = i * step - Math.PI / 2;
    ctx[i === 0 ? 'moveTo' : 'lineTo'](x + Math.cos(angle) * radius, y + Math.sin(angle) * radius);
  }
  ctx.closePath();
}

function drawShape(s) {
  const fy = s.y + Math.sin(s.t) * s.floatAmp;
  const fx = s.x + Math.cos(s.t * 0.7) * (s.floatAmp * 0.4);
  ctx.save();
  ctx.translate(fx, fy);
  ctx.rotate(s.rot);
  ctx.strokeStyle = `rgba(240,192,64,${s.opacity})`;
  ctx.lineWidth = 1.6;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.setLineDash([]);

  const r = s.size;

  if (s.type === 'star') {
    drawStar(ctx, 0, 0, r);
    ctx.stroke();
  } else if (s.type === 'circle') {
    ctx.setLineDash([3, 5]);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
    ctx.stroke();
  } else if (s.type === 'arc') {
    ctx.beginPath();
    ctx.arc(0, 0, r, 0.3, Math.PI * 1.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.55, Math.PI + 0.3, Math.PI * 2 - 0.3);
    ctx.stroke();
  } else if (s.type === 'zigzag') {
    ctx.beginPath();
    const steps = 5; const w = r * 1.4;
    for (let i = 0; i <= steps; i++) {
      const px = -w/2 + (w/steps)*i;
      const py = (i % 2 === 0 ? -1 : 1) * r * 0.5;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  } else if (s.type === 'cross') {
    ctx.beginPath();
    ctx.moveTo(-r, 0); ctx.lineTo(r, 0);
    ctx.moveTo(0, -r); ctx.lineTo(0, r);
    ctx.stroke();
    ctx.setLineDash([2, 4]);
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.75, 0, Math.PI * 2);
    ctx.stroke();
  } else if (s.type === 'pencil') {
    // pencil body
    ctx.beginPath();
    ctx.rect(-r*0.18, -r, r*0.36, r*1.4);
    ctx.stroke();
    // tip
    ctx.beginPath();
    ctx.moveTo(-r*0.18, r*0.4); ctx.lineTo(0, r*0.85); ctx.lineTo(r*0.18, r*0.4);
    ctx.stroke();
    // eraser top line
    ctx.beginPath();
    ctx.moveTo(-r*0.18, -r*0.7); ctx.lineTo(r*0.18, -r*0.7);
    ctx.stroke();
  }

  ctx.restore();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  shapes.forEach(s => {
    s.t += s.speed;
    s.rot += s.rotSpeed;
    drawShape(s);
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
